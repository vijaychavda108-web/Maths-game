<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>પરિમિતિ શીખો - બાળકોની ગેમ</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Vadodara:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Hind Vadodara', sans-serif;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #E0F7FA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 20px;
            position: relative;
        }
        /* --- Start Screen --- */
        #start-screen h1 { color: #FF9800; font-size: 2.5rem; margin-bottom: 10px; }
        .input-group { margin: 15px 0; }
        input {
            width: 80%;
            padding: 12px;
            border: 2px solid #4CAF50;
            border-radius: 10px;
            font-size: 1.1rem;
            outline: none;
        }
        .error-msg { color: red; display: none; margin-bottom: 10px; font-weight: 600; }
        .btn-primary {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.3rem;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
            transition: transform 0.2s;
            font-weight: bold;
        }
        .btn-primary:hover { transform: scale(1.05); }

        /* --- Game Screen --- */
        #game-screen, #win-screen { display: none; }
        .header-info {
            display: flex;
            justify-content: space-between;
            background: #FFECB3;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #E65100;
            font-weight: 700;
        }
        .game-area {
            position: relative;
            height: 250px;
            background: #B3E5FC;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 3px solid #81D4FA;
        }
        .grass-strip {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40px;
            background: #8BC34A;
            border-top: 4px solid #689F38;
        }
        .goat {
            position: absolute;
            bottom: 35px;
            left: 10px;
            font-size: 3rem;
            transition: all 0.8s ease-in-out;
            z-index: 10;
        }
        .shape-container {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        svg { width: 100%; height: 100%; overflow: visible; }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .option-btn {
            background-color: #FFF;
            border: 2px solid #2196F3;
            color: #2196F3;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .option-btn:hover { background-color: #E3F2FD; }
        .correct { background-color: #4CAF50 !important; color: white !important; border-color: #4CAF50 !important; }
        .wrong { background-color: #F44336 !important; color: white !important; border-color: #F44336 !important; }
        .message-box { font-size: 1.3rem; font-weight: bold; color: #4CAF50; height: 30px; margin-bottom: 10px;}
        
        /* Animations */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-10deg); }
            50% { transform: translateX(10px) rotate(10deg); }
            75% { transform: translateX(-10px) rotate(-10deg); }
            100% { transform: translateX(0); }
        }
        .shake { animation: shake 0.5s ease; }
        
        /* --- Win Screen --- */
        #win-screen h2 { color: #4CAF50; font-size: 2.5rem; }
        .trophy { font-size: 5rem; margin: 20px 0; }
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: red;
            animation: fall linear infinite;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <audio id="audio-correct" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3"></audio>
    <audio id="audio-wrong" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3"></audio>
    <audio id="audio-win" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>

    <div class="container">
        <div id="start-screen">
            <h1>આવો પરિમિતિ શીખીએ! 🐐</h1>
            <p>આકારની બધી બાજુઓનો સરવાળો એટલે પરિમિતિ.</p>
            <div class="input-group">
                <input type="text" id="school-name" placeholder="શાળાનું નામ દાખલ કરો">
            </div>
            <div class="input-group">
                <input type="text" id="student-name" placeholder="વિદ્યાર્થીનું નામ દાખલ કરો">
            </div>
            <div class="error-msg" id="error-msg">કૃપા કરીને શાળા અને વિદ્યાર્થી બંનેનું નામ દાખલ કરો!</div>
            <button class="btn-primary" onclick="startGame()">રમત શરૂ કરો ▶</button>
        </div>

        <div id="game-screen">
            <div class="header-info">
                <span id="display-student"></span>
                <span id="display-school"></span>
            </div>
            <div class="stats">
                <span>સ્કોર: <span id="score">0</span> / 250</span>
                <span>સમય: <span id="timer">60</span> સેકન્ડ</span>
            </div>
            
            <div class="message-box" id="message-box"></div>

            <div class="game-area">
                <div class="shape-container" id="shape-container">
                    </div>
                <div class="goat" id="goat">🐐</div>
                <div class="grass-strip"></div>
            </div>

            <div class="options-grid" id="options-container">
                </div>
        </div>

        <div id="win-screen">
            <div class="trophy">🏆</div>
            <h2>અભિનંદન!</h2>
            <h3 id="winner-name" style="color:#FF9800;"></h3>
            <p id="winner-school" style="font-size:1.2rem; color:#666;"></p>
            <p style="font-size: 1.5rem; font-weight:bold; color: #4CAF50;">તમે 250 પોઈન્ટ્સ પૂરા કર્યા છે!</p>
            <button class="btn-primary" onclick="location.reload()" style="margin-top: 20px;">ફરી રમો ↺</button>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 60;
        let timerInterval;
        let currentAnswer = 0;
        let isAnimating = false;

        // Elements
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const winScreen = document.getElementById('win-screen');
        const errorMsg = document.getElementById('error-msg');
        const goat = document.getElementById('goat');
        const msgBox = document.getElementById('message-box');
        
        const audioCorrect = document.getElementById('audio-correct');
        const audioWrong = document.getElementById('audio-wrong');
        const audioWin = document.getElementById('audio-win');

        function startGame() {
            const school = document.getElementById('school-name').value.trim();
            const student = document.getElementById('student-name').value.trim();

            if (!school || !student) {
                errorMsg.style.display = 'block';
                return;
            }

            document.getElementById('display-school').innerText = 'શાળા: ' + school;
            document.getElementById('display-student').innerText = 'વિદ્યાર્થી: ' + student;
            document.getElementById('winner-school').innerText = school;
            document.getElementById('winner-name').innerText = student + " જીતી ગયો/ગઈ છે!";

            startScreen.style.display = 'none';
            gameScreen.style.display = 'block';

            startTimer();
            generateLevel();
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("સમય પૂરો થઈ ગયો! ગેમ ઓવર. ફરી પ્રયાસ કરો.");
                    location.reload();
                }
            }, 1000);
        }

        function generateLevel() {
            isAnimating = false;
            goat.style.transform = 'translateX(0)';
            goat.innerText = '🐐';
            goat.classList.remove('shake');
            msgBox.innerText = '';

            const container = document.getElementById('shape-container');
            const shapeType = Math.floor(Math.random() * 3); // 0: Square, 1: Rectangle, 2: Triangle
            const unit = Math.random() > 0.5 ? 'cm' : 'm';
            
            let svgHtml = '';
            
            if (shapeType === 0) {
                // Square
                const side = Math.floor(Math.random() * 10) + 2;
                currentAnswer = side * 4;
                svgHtml = `
                    <svg viewBox="0 0 100 100">
                        <rect x="20" y="20" width="60" height="60" fill="#FFF9C4" stroke="#F57F17" stroke-width="3"/>
                        <text x="50" y="15" font-size="12" text-anchor="middle" fill="#000">${side} ${unit}</text>
                        <text x="50" y="58" font-size="24" text-anchor="middle">🌿</text>
                    </svg>
                `;
            } else if (shapeType === 1) {
                // Rectangle
                const l = Math.floor(Math.random() * 8) + 5;
                const w = Math.floor(Math.random() * 4) + 1;
                currentAnswer = 2 * (l + w);
                svgHtml = `
                    <svg viewBox="0 0 100 100">
                        <rect x="10" y="30" width="80" height="40" fill="#E1BEE7" stroke="#8E24AA" stroke-width="3"/>
                        <text x="50" y="25" font-size="12" text-anchor="middle" fill="#000">${l} ${unit}</text>
                        <text x="95" y="55" font-size="10" text-anchor="start" fill="#000">${w} ${unit}</text>
                        <text x="50" y="58" font-size="24" text-anchor="middle">🌿</text>
                    </svg>
                `;
            } else {
                // Triangle
                const s1 = Math.floor(Math.random() * 6) + 3;
                const s2 = Math.floor(Math.random() * 6) + 3;
                const s3 = Math.floor(Math.random() * 6) + 3;
                currentAnswer = s1 + s2 + s3;
                svgHtml = `
                    <svg viewBox="0 0 100 100">
                        <polygon points="50,15 15,80 85,80" fill="#C8E6C9" stroke="#388E3C" stroke-width="3"/>
                        <text x="20" y="45" font-size="10" text-anchor="end" fill="#000">${s1} ${unit}</text>
                        <text x="80" y="45" font-size="10" text-anchor="start" fill="#000">${s2} ${unit}</text>
                        <text x="50" y="95" font-size="12" text-anchor="middle" fill="#000">${s3} ${unit}</text>
                        <text x="50" y="65" font-size="24" text-anchor="middle">🌿</text>
                    </svg>
                `;
            }

            container.innerHTML = svgHtml;
            generateOptions(currentAnswer, unit);
        }

        function generateOptions(correct, unit) {
            let options = [correct];
            while (options.length < 4) {
                let wrongObj = correct + (Math.floor(Math.random() * 10) - 5);
                if (wrongObj > 0 && wrongObj !== correct && !options.includes(wrongObj)) {
                    options.push(wrongObj);
                }
            }
            
            // Shuffle
            options.sort(() => Math.random() - 0.5);

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt + ' ' + unit;
                btn.onclick = () => checkAnswer(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            if (isAnimating) return;
            isAnimating = true;

            if (selected === currentAnswer) {
                audioCorrect.play();
                btn.classList.add('correct');
                msgBox.innerText = "યમ્મી! 🌿😋";
                
                // Animation: Goat moves to center
                goat.style.transform = 'translateX(120px) translateY(-10px)';
                
                setTimeout(() => {
                    goat.innerText = '🌿😋';
                    score += 10;
                    document.getElementById('score').innerText = score;
                    
                    if (score >= 250) {
                        setTimeout(winGame, 1000);
                    } else {
                        setTimeout(generateLevel, 1500);
                    }
                }, 800);

            } else {
                audioWrong.play();
                btn.classList.add('wrong');
                goat.innerText = '😕';
                goat.classList.add('shake');
                
                setTimeout(() => {
                    goat.classList.remove('shake');
                    goat.innerText = '🐐';
                    btn.classList.remove('wrong');
                    isAnimating = false;
                }, 800);
            }
        }

        function winGame() {
            clearInterval(timerInterval);
            gameScreen.style.display = 'none';
            winScreen.style.display = 'block';
            audioWin.play();
            createConfetti();
        }

        function createConfetti() {
            const colors = ['#f44336', '#4caf50', '#ffeb3b', '#2196f3'];
            for (let i = 0; i < 100; i++) {
                let confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(confetti);
            }
        }
    </script>
</body>
</html>
