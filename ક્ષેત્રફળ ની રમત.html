<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ચોરસ અને લંબચોરસનું ક્ષેત્રફળ - શૈક્ષણિક રમત</title>
    <style>
        :root {
            --primary-color: #FF9F43;
            --secondary-color: #2ECB71;
            --danger-color: #E74C3C;
            --bg-color: #f0f8ff;
            --text-color: #333;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
            overflow: hidden; /* For confetti */
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1, h2 { color: var(--primary-color); }
        
        /* --- Start Screen Styles --- */
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .btn-start, .btn-restart {
            background-color: var(--secondary-color);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
        }
        .btn-start:hover, .btn-restart:hover { transform: scale(1.05); background-color: #27ae60;}
        .error-msg { color: var(--danger-color); margin-top: 10px; display: none; }
        .creator-info { font-size: 14px; color: #666; margin-bottom: 20px; background-color: #f9f9f9; padding: 10px; border-radius: 8px;}

        /* --- Game Screen Styles --- */
        .game-header {
            display: flex;
            justify-content: space-between;
            background: #fdf2e9;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .game-area-container {
            height: 300px;
            position: relative;
            border: 3px solid #ddd;
            border-radius: 15px;
            background-color: #87CEEB; /* Sky */
            overflow: hidden;
        }
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background-color: var(--secondary-color);
            border-top: 3px solid #27ae60;
        }
        .bear {
            font-size: 60px;
            position: absolute;
            bottom: 30px;
            left: 20px;
            transition: all 0.5s ease;
            z-index: 5;
        }
        .shape-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
        }
        /* SVG Styling */
        .shape-svg rect { fill: rgba(255, 255, 255, 0.7); stroke: #333; stroke-width: 3; }
        .shape-svg text { font-size: 16px; font-weight: bold; fill: #333; }
        .banana-inside { font-size: 40px; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }
        .option-btn {
            padding: 15px;
            font-size: 22px;
            border: 2px solid var(--primary-color);
            background: white;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option-btn:hover { background-color: #fff0e6; }
        .option-btn.correct { background-color: var(--secondary-color); color: white; border-color: var(--secondary-color); }
        .option-btn.wrong { background-color: var(--danger-color); color: white; border-color: var(--danger-color); }
        .message-box { min-height: 30px; font-size: 20px; font-weight: bold; color: var(--primary-color); margin-top: 10px;}

        /* --- Animations --- */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        .shake-sad { animation: shake 0.5s; }
        .bear.jump-to-eat { left: 50%; bottom: 150px; transform: translate(-50%, 0) scale(1.2); }
        
        /* --- Win Screen & Confetti --- */
        .win-icon { font-size: 80px; }
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Utility classes */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<audio id="snd-correct" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>
<audio id="snd-wrong" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="snd-win" src="https://actions.google.com/sounds/v1/awards/applause.ogg"></audio>
<audio id="snd-eat" src="https://actions.google.com/sounds/v1/eating/eating_bite.ogg"></audio>

<div class="container">
    <div id="start-screen">
        <h1>🐻 ચોરસ અને લંબચોરસનું ક્ષેત્રફળ 🍌</h1>
        <h2>સ્વાગત છે!</h2>
        <div class="creator-info">
            Created by: વિજય ચાવડા <br>
            દાદાના મુવાડા પ્રાથમિક શાળા તા. ફાગવેલ જિ.ખેડા
        </div>
        
        <div class="input-group">
            <label for="schoolName">શાળાનું નામ:</label>
            <input type="text" id="schoolName" placeholder="દા.ત. પ્રાથમિક શાળા...">
        </div>
        <div class="input-group">
            <label for="studentName">વિદ્યાર્થીનું નામ:</label>
            <input type="text" id="studentName" placeholder="દા.ત. રાહુલ...">
        </div>
        <p id="start-error" class="error-msg">કૃપા કરીને બંને નામ ભરો.</p>
        <button class="btn-start" onclick="startGame()">રમત શરૂ કરો ▶</button>
    </div>

    <div id="game-screen" class="hidden">
        <div class="game-header">
            <span id="disp-student">વિદ્યાર્થી: -</span>
            <span id="disp-school">શાળા: -</span>
        </div>
        <div class="stats-bar">
            <span>પ્રશ્ન: <span id="q-num">1</span>/5</span>
            <span>સમય: <span id="timer">60</span>s</span>
            <span>સ્કોર: <span id="score">0</span></span>
        </div>

        <div class="message-box" id="game-message">સાચું ક્ષેત્રફળ શોધો!</div>

        <div class="game-area-container">
            <div class="bear" id="bear-emoji">🐻</div>
            <div class="shape-container">
                <svg id="shape-svg" class="shape-svg" width="250" height="200" viewBox="0 0 300 250">
                    <rect id="svg-rect" x="50" y="50" width="100" height="100" />
                    <text id="txt-top" x="100" y="40" text-anchor="middle">10 m</text>
                    <text id="txt-left" x="40" y="100" text-anchor="end" dominant-baseline="middle">10 m</text>
                    <text id="banana-svg" x="100" y="115" text-anchor="middle" class="banana-inside">🍌</text>
                </svg>
            </div>
            <div class="ground"></div>
        </div>

        <div class="options-grid" id="options-container">
            </div>
    </div>

    <div id="win-screen" class="hidden">
        <div class="win-icon">🏆</div>
        <h1>અભિનંદન!</h1>
        <h2 id="final-message">તમે જીતી ગયા!</h2>
        <p>વિજેતા: <span id="win-student"></span></p>
        <p>શાળા: <span id="win-school"></span></p>
        <p class="stats-bar" style="justify-content: center;">ફાઇનલ સ્કોર: <span id="final-score">0</span></p>
        <button class="btn-restart" onclick="location.reload()">ફરી રમો ↺</button>
    </div>
</div>
<canvas id="confetti-canvas" class="hidden"></canvas>

<script>
    // --- Variables ---
    let gameState = {
        studentName: "",
        schoolName: "",
        score: 0,
        questionCount: 0,
        totalQuestions: 5,
        timeLeft: 60,
        timerId: null,
        correctAnswer: 0,
        isProcessing: false
    };

    // Sounds
    const sndCorrect = document.getElementById('snd-correct');
    const sndWrong = document.getElementById('snd-wrong');
    const sndWin = document.getElementById('snd-win');
    const sndEat = document.getElementById('snd-eat');

    // DOM Elements
    const startScreen = document.getElementById('start-screen');
    const gameScreen = document.getElementById('game-screen');
    const winScreen = document.getElementById('win-screen');
    const errorMsg = document.getElementById('start-error');
    const bearEmoji = document.getElementById('bear-emoji');
    const gameMessage = document.getElementById('game-message');
    const bananaSvg = document.getElementById('banana-svg');

    // --- Functions ---

    function startGame() {
        const sName = document.getElementById('studentName').value.trim();
        const scName = document.getElementById('schoolName').value.trim();

        if (sName === "" || scName === "") {
            errorMsg.style.display = "block";
            return;
        }

        gameState.studentName = sName;
        gameState.schoolName = scName;

        // Update Header
        document.getElementById('disp-student').innerText = `વિદ્યાર્થી: ${sName}`;
        document.getElementById('disp-school').innerText = `શાળા: ${scName}`;

        // Switch Screens
        startScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        errorMsg.style.display = "none";

        // Start Timer and Load Question
        startTimer();
        loadNextQuestion();
    }

    function startTimer() {
        gameState.timerId = setInterval(() => {
            gameState.timeLeft--;
            document.getElementById('timer').innerText = gameState.timeLeft;
            if (gameState.timeLeft <= 0) {
                gameOver();
            }
        }, 1000);
    }

    function gameOver() {
        clearInterval(gameState.timerId);
        alert("સમય સમાપ્ત! ગેમ ઓવર.");
        location.reload();
    }

    function generateRandomNumber(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function loadNextQuestion() {
        if (gameState.questionCount >= gameState.totalQuestions) {
            gameWin();
            return;
        }

        gameState.isProcessing = false;
        gameState.questionCount++;
        document.getElementById('q-num').innerText = gameState.questionCount;
        gameMessage.innerText = "સાચું ક્ષેત્રફળ શોધો!";
        gameMessage.style.color = "var(--primary-color)";
        bearEmoji.classList.remove('shake-sad', 'jump-to-eat');
        bananaSvg.style.opacity = "1"; // Show banana

        // Generate Shape
        const isSquare = Math.random() > 0.5;
        let side1, side2, unit;
        unit = Math.random() > 0.5 ? "cm" : "m";

        if (isSquare) {
            side1 = generateRandomNumber(5, 15);
            side2 = side1;
        } else {
            side1 = generateRandomNumber(5, 12);
            side2 = generateRandomNumber(13, 20);
        }

        gameState.correctAnswer = side1 * side2;

        // Draw SVG Shape
        drawSVGShape(side1, side2, unit, isSquare);

        // Generate Options
        generateOptions(gameState.correctAnswer, side1, side2, unit);
    }

    function drawSVGShape(w, h, unit, isSquare) {
        const svgRect = document.getElementById('svg-rect');
        const txtTop = document.getElementById('txt-top');
        const txtLeft = document.getElementById('txt-left');
        const svgBanana = document.getElementById('banana-svg');
        
        // Scale down for SVG viewbox (max approx 150px)
        const scaleFactor = 8; 
        let svgW = w * scaleFactor;
        let svgH = h * scaleFactor;
        
        // Center positions
        let centerX = 150;
        let centerY = 125;
        let startX = centerX - (svgW / 2);
        let startY = centerY - (svgH / 2);

        svgRect.setAttribute('x', startX);
        svgRect.setAttribute('y', startY);
        svgRect.setAttribute('width', svgW);
        svgRect.setAttribute('height', svgH);

        txtTop.setAttribute('x', centerX);
        txtTop.setAttribute('y', startY - 10);
        txtTop.textContent = `${w} ${unit}`;

        txtLeft.setAttribute('x', startX - 10);
        txtLeft.setAttribute('y', centerY);
        txtLeft.textContent = `${h} ${unit}`;
        
        svgBanana.setAttribute('x', centerX);
        svgBanana.setAttribute('y', centerY + 5); // slight offset for emoji center
    }

    function generateOptions(correct, s1, s2, unit) {
        let options = new Set();
        options.add(correct);

        // Generate plausible wrong answers
        while (options.size < 4) {
            let wrong;
            const type = generateRandomNumber(1, 4);
            switch(type) {
                case 1: wrong = correct + generateRandomNumber(1, 10); break; // Close higher
                case 2: wrong = correct - generateRandomNumber(1, 10); break; // Close lower
                case 3: wrong = (s1 + s2) * 2; break; // Perimeter mistake
                case 4: wrong = s1 + s2; break; // Addition mistake
            }
            if (wrong > 0 && wrong !== correct) {
                options.add(wrong);
            }
        }

        const optionsArray = Array.from(options).sort(() => Math.random() - 0.5); // Shuffle
        const container = document.getElementById('options-container');
        container.innerHTML = ""; // Clear previous

        optionsArray.forEach(opt => {
            const btn = document.createElement('button');
            btn.classList.add('option-btn');
            btn.innerText = `${opt} ચો.${unit}`; // sq. unit in Gujarati
            btn.onclick = () => checkAnswer(btn, opt);
            container.appendChild(btn);
        });
    }

    function checkAnswer(btnElement, selectedValue) {
        if (gameState.isProcessing) return;
        gameState.isProcessing = true;

        if (selectedValue === gameState.correctAnswer) {
            // Correct!
            btnElement.classList.add('correct');
            sndCorrect.play();
            gameMessage.innerText = "યમ્મી! 😋";
            gameMessage.style.color = "var(--secondary-color)";
            
            gameState.score += 10;
            document.getElementById('score').innerText = gameState.score;
            
            // Animation: Bear jumps and eats banana
            bearEmoji.classList.add('jump-to-eat');
            setTimeout(() => {
                 sndEat.play();
                 bananaSvg.style.opacity = "0"; // Hide banana
            }, 600); // Sync with jump apex

            setTimeout(loadNextQuestion, 2000);

        } else {
            // Wrong!
            btnElement.classList.add('wrong');
            sndWrong.play();
            bearEmoji.classList.add('shake-sad');
            bearEmoji.innerText = "😕";
            gameMessage.innerText = "ખોટો જવાબ, ફરી પ્રયાસ કરો!";
            gameMessage.style.color = "var(--danger-color)";

            setTimeout(() => {
                 bearEmoji.classList.remove('shake-sad');
                 bearEmoji.innerText = "🐻";
                 gameState.isProcessing = false; // Allow retry
            }, 1000);
        }
    }

    function gameWin() {
        clearInterval(gameState.timerId);
        gameScreen.classList.add('hidden');
        winScreen.classList.remove('hidden');
        sndWin.play();

        document.getElementById('win-student').innerText = gameState.studentName;
        document.getElementById('win-school').innerText = gameState.schoolName;
        document.getElementById('final-score').innerText = gameState.score;

        startConfetti();
    }

    // --- Confetti Animation (Simplified JS implementation) ---
    function startConfetti() {
        const canvas = document.getElementById('confetti-canvas');
        canvas.classList.remove('hidden');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const pieces = [];
        const colors = ['#f00', '#0f0', '#00f', '#ff0', '#0ff', '#f0f'];

        for (let i = 0; i < 200; i++) {
            pieces.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                w: Math.random() * 10 + 5,
                h: Math.random() * 10 + 5,
                c: colors[Math.floor(Math.random() * colors.length)],
                s: Math.random() * 5 + 2 // speed
            });
        }

        function drawConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(p => {
                ctx.fillStyle = p.c;
                ctx.fillRect(p.x, p.y, p.w, p.h);
                p.y += p.s;
                if (p.y > canvas.height) p.y = -20;
            });
            requestAnimationFrame(drawConfetti);
        }
        drawConfetti();
    }

</script>
</body>
</html>
